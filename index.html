<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f7f3" />
    <title>Nemotron ASR</title>
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <a class="brand" href="/">Nemotron Web</a>
        <div class="source-links">
          <a class="source-link" href="https://github.com/People-11/Nemotron_Web" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3.3-.4 6.8-1.6 6.8-7A5.4 5.4 0 0 0 19.4 4 5 5 0 0 0 19.3.5S18.2.1 15 1.8a13.4 13.4 0 0 0-6 0C5.8.1 4.7.5 4.7.5A5 5 0 0 0 4.6 4a5.4 5.4 0 0 0-1.4 3.7c0 5.4 3.5 6.6 6.8 7A4.8 4.8 0 0 0 9 18v4M9 19c-3 .9-3-1.5-4-2"/></svg>
            Source
          </a>
          <a class="source-link" href="https://huggingface.co/nvidia/nemotron-3.5-asr-streaming-0.6b" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7m0-7L10 14M5 5h5M5 5v14h14v-5"/></svg>
            Model card
          </a>
        </div>
      </header>

      <section class="workspace">
        <div class="title-row"><h1>Nemotron ASR</h1></div>

        <div class="toolbar">
          <div class="control-group">
            <label class="control-label">Language
              <select id="language">
                <option value="101">Auto</option>
                <option value="4">Chinese</option>
                <option value="0">English</option>
                <option value="10">Japanese</option>
                <option value="14">Korean</option>
              </select>
            </label>
          </div>

          <div class="action-group">
            <label class="icon-button" title="Upload audio">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4m0 0L7 9m5-5 5 5M5 15v4h14v-4"/></svg>
              <span>Upload</span>
              <input id="audio-file" class="sr-only" type="file" accept="audio/*" />
            </label>
            <button id="microphone" class="icon-button" type="button">
              <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6"/></svg>
              <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12"/></svg>
              <span id="microphone-label">Record</span>
            </button>
            <button id="transcribe" class="run-button" type="button" disabled>
              <svg class="run-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 11 7-11 7z"/></svg>
              <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12"/></svg>
              <span id="transcribe-label">Run</span>
            </button>
          </div>
        </div>

        <div class="metrics">
          <div><span class="metric-label">Status</span><strong id="status" class="metric-value">checking cache</strong></div>
          <div><span class="metric-label">Duration</span><strong id="audio-time" class="metric-value">0:00</strong></div>
          <div><span class="metric-label">Weights</span><strong id="load-time" class="metric-value">—</strong></div>
          <div><span class="metric-label">Chunk</span><strong id="chunk-time" class="metric-value">—</strong></div>
          <div><span class="metric-label">Chunks</span><strong id="chunk-count" class="metric-value">0</strong></div>
          <div class="cache-metric">
            <span class="metric-label">Cache <button id="clear-cache" class="metric-action" type="button">clear</button></span>
            <strong id="cache-status" class="metric-value">checking…</strong>
          </div>
        </div>

        <p id="error-message" class="error-message" hidden></p>

        <section class="signal-section">
          <div class="signal-stack">
            <div class="audio-transport">
              <audio id="native-audio" preload="metadata"></audio>
              <button id="playback" class="transport-button" type="button" disabled aria-label="Play audio">
                <span class="play-symbol">▶</span><span class="pause-symbol">Ⅱ</span>
              </button>
              <span id="playback-time" class="transport-time">0:00</span>
              <input id="transport-range" class="transport-range" type="range" min="0" max="0.01" step="0.01" value="0" disabled aria-label="Audio position" />
              <span id="transport-duration" class="transport-time">0:00</span>
            </div>
            <div class="signal-frame">
              <div class="plot">
                <canvas id="waveform"></canvas>
                <canvas id="waveform-buffer" aria-hidden="true"></canvas>
              </div>
              <div id="playhead" class="playhead" hidden></div>
            </div>
          </div>

          <div class="transcript-area">
            <p id="transcript" class="transcript empty">Upload audio or start the microphone, then run Nemotron.</p>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
